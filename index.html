<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coockie AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.0/full/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brown: #8B6340; --brown-dark: #5C3D1E;
    --bg: #f5f5f4; --bg-main: #ffffff; --bg-sidebar: #fafaf9;
    --text: #1a1a18; --text-muted: #6b6b67; --text-hint: #a8a8a2;
    --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.14);
    --radius: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --sidebar-width: 220px;
    --topbar-height: 52px;
    --bottom-nav-height: 56px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg-main: #1c1c1b; --bg-sidebar: #212120;
      --text: #f0f0ec; --text-muted: #9a9a94; --text-hint: #5a5a56;
      --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.13);
    }
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: system-ui, -apple-system, sans-serif; touch-action: manipulation; }
  #app { display: flex; height: 100vh; max-width: 100%; margin: 0 auto; background: var(--bg-main); overflow: hidden; position: relative; }

  /* ===== АВАТАР З АНІМАЦІЄЮ ===== */
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-top: 1px;
    background: var(--bg-sidebar);
    border: 0.5px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .avatar .cookie-emoji {
    font-size: 22px;
    line-height: 1;
    display: block;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center center;
    position: relative;
  }
  .avatar.typing .cookie-emoji {
    animation: cookieWalk 1.4s ease-in-out infinite;
  }
  .avatar.done .cookie-emoji {
    animation: cookieReturn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes cookieWalk {
    0% { transform: translateX(0) rotate(0deg) scale(1); }
    25% { transform: translateX(6px) rotate(15deg) scale(1.05); }
    50% { transform: translateX(10px) rotate(0deg) scale(1.1); }
    75% { transform: translateX(6px) rotate(-15deg) scale(1.05); }
    100% { transform: translateX(0) rotate(0deg) scale(1); }
  }
  @keyframes cookieReturn {
    0% { transform: translateX(12px) rotate(20deg) scale(1.15); }
    40% { transform: translateX(-3px) rotate(-5deg) scale(0.95); }
    70% { transform: translateX(2px) rotate(3deg) scale(1.02); }
    100% { transform: translateX(0) rotate(0deg) scale(1); }
  }

  /* ===== ДЕСКТОПНА ВЕРСІЯ ===== */
  #sidebar {
    width: var(--sidebar-width);
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #logo { padding: 14px 12px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  #logo-text { font-size: 17px; font-weight: 600; color: var(--text); }
  #logo-text em { color: var(--brown); font-style: normal; }
  #new-chat-btn { margin: 8px 8px 4px; padding: 7px 10px; background: transparent; border: 0.5px solid var(--border-md); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; flex-shrink: 0; }
  #new-chat-btn:hover { background: var(--bg-main); color: var(--text); }
  #chats-label { padding: 6px 12px 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-hint); flex-shrink: 0; }
  #chat-list { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
  #chat-list::-webkit-scrollbar { width: 3px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
  .chat-item { padding: 5px 8px; border-radius: var(--radius); cursor: pointer; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background 0.12s; display: flex; align-items: center; gap: 6px; }
  .chat-item:hover { background: var(--bg-main); color: var(--text); }
  .chat-item.active { background: var(--bg-main); color: var(--text); font-weight: 500; }
  .chat-item .delete-chat { margin-left: auto; opacity: 0.3; cursor: pointer; font-size: 11px; padding: 0 3px; flex-shrink: 0; }
  .chat-item:hover .delete-chat { opacity: 0.8; }

  #backup-buttons { padding: 6px 8px; border-top: 0.5px solid var(--border); display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }
  #backup-buttons button { padding: 4px 8px; font-size: 10px; border: 0.5px solid var(--border-md); border-radius: 5px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 3px; flex: 1; justify-content: center; }
  #backup-buttons button:hover { background: var(--bg-main); color: var(--text); border-color: var(--brown); }
  #backup-buttons .import-btn { position: relative; overflow: hidden; }
  #backup-buttons .import-btn input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-main); height: 100vh; overflow: hidden; }
  #topbar { padding: 8px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; flex-shrink: 0; min-height: var(--topbar-height); }
  #topbar-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #topbar-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 11px; }
  .top-link { color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: color 0.2s; font-size: 11px; }
  .top-link:hover { color: var(--brown); }
  .top-divider { color: var(--border); font-size: 8px; }
  .lang-select { background: transparent; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 2px 4px; outline: none; font-family: inherit; }
  .lang-select:hover { color: var(--text); }
  .lang-select option { background: var(--bg-main); color: var(--text); font-size: 14px; }
  .donate-btn { display: inline-flex; align-items: center; gap: 5px; padding: 4px 14px; background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a18; border-radius: 20px; font-weight: 600; font-size: 11px; text-decoration: none; transition: all 0.25s ease; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(247, 151, 30, 0.25); }
  .donate-btn:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(247, 151, 30, 0.4); }
  .donate-btn i { font-size: 14px; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; background: var(--bg); }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }
  .welcome { margin: auto; text-align: center; padding: 16px; max-width: 380px; }
  .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); margin: 8px 0 4px; }
  .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar { width: 36px; height: 36px; font-size: 22px; }
  .msg .avatar .cookie-emoji { font-size: 22px; }
  .msg .bubble { max-width: calc(100% - 56px); padding: 8px 14px; font-size: 14px; line-height: 1.6; color: var(--text); word-break: break-word; background: var(--bg-sidebar); border: 0.5px solid var(--border); border-radius: 4px 14px 14px 14px; }
  .msg.user .bubble { background: var(--brown); color: #fdf6ec; border-radius: 14px 4px 14px 14px; }

  .code-block { margin: 6px 0; border-radius: 6px; overflow: hidden; border: 0.5px solid var(--border-md); }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: rgba(0,0,0,0.08); font-size: 10px; color: var(--text-muted); }
  .code-header .lang { font-weight: 600; }
  .code-actions { display: flex; gap: 3px; }
  .code-actions button { padding: 1px 6px; font-size: 10px; border: 0.5px solid var(--border-md); border-radius: 3px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 2px; }
  .code-actions button:hover { background: var(--bg-main); color: var(--text); }
  .code-block pre { margin: 0; padding: 10px; background: #0d1117; overflow-x: auto; font-size: 13px; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.5; }
  .code-block pre code { font-family: inherit; }

  .gen-image-wrap { margin: 6px 0; }
  .gen-image-wrap img { max-width: 100%; max-height: 260px; border-radius: 8px; display: block; border: 0.5px solid var(--border-md); }
  .gen-image-wrap .img-caption { font-size: 10px; color: var(--text-hint); margin-top: 3px; }
  .img-generating { display: flex; align-items: center; gap: 6px; padding: 10px; background: var(--bg-sidebar); border-radius: 8px; border: 0.5px solid var(--border); font-size: 12px; color: var(--text-muted); }
  .run-preview { margin: 6px 0; border: 0.5px solid var(--border-md); border-radius: 6px; overflow: hidden; }
  .run-preview iframe { width: 100%; height: 260px; border: none; background: white; }
  .typing { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; background: var(--text-hint); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2}40%{opacity:1} }

  #input-area { border-top: 0.5px solid var(--border); padding: 10px 14px; flex-shrink: 0; background: var(--bg-main); }
  #input-row { display: flex; gap: 6px; align-items: flex-end; }
  #text-input { flex: 1; min-height: 32px; max-height: 100px; padding: 6px 10px; border: 0.5px solid var(--border-md); border-radius: var(--radius); background: var(--bg-main); color: var(--text); font-size: 13px; resize: none; font-family: inherit; line-height: 1.4; outline: none; transition: border-color 0.15s; }
  #text-input:focus { border-color: var(--brown); }
  #text-input::placeholder { color: var(--text-hint); font-size: 12px; }
  #send-btn { width: 32px; height: 32px; flex-shrink: 0; background: var(--brown); border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.15s, transform 0.1s; }
  #send-btn:hover { background: var(--brown-dark); }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 20px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* ================================================================ */
  /* ===== МОБІЛЬНА ВЕРСІЯ ===== */
  /* ================================================================ */
  .mobile-only { display: none !important; }
  #bottom-nav { display: none; }
  #chat-screen-mobile { display: none; }
  #chat-list-screen-mobile { display: none; }
  .back-btn { display: none; }
  #input-area-mobile { display: none; }
  #messages-mobile { display: none; }

  @media (max-width: 600px) {
    :root { --sidebar-width: 0px; --topbar-height: 48px; --bottom-nav-height: 56px; }
    #sidebar { display: none !important; }
    #messages { display: none !important; }
    #input-area { display: none !important; }
    #topbar-links .top-link, #topbar-links .top-divider, #topbar-links .donate-btn { display: none !important; }
    .lang-select { display: none !important; }

    .mobile-only { display: flex !important; }
    #app { flex-direction: column; height: 100vh; }

    #topbar { padding: 6px 12px; min-height: var(--topbar-height); border-bottom: 0.5px solid var(--border); flex-shrink: 0; z-index: 10; background: var(--bg-main); display: flex !important; align-items: center; justify-content: space-between; }
    #topbar-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .back-btn { display: flex !important; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; }
    #topbar-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #topbar-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .lang-select-mobile { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 2px; outline: none; font-family: inherit; }
    .lang-select-mobile option { background: var(--bg-main); color: var(--text); font-size: 14px; }
    .top-icon-btn { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; transition: color 0.2s; display: flex; align-items: center; }
    .top-icon-btn:hover { color: var(--text); }

    #chat-list-screen-mobile { display: flex !important; flex: 1; flex-direction: column; overflow-y: auto; padding: 4px 0; background: var(--bg-main); }
    #chat-list-screen-mobile::-webkit-scrollbar { width: 0; }
    .chat-list-header-mobile { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 4px; flex-shrink: 0; }
    .chat-list-header-mobile h3 { font-size: 13px; font-weight: 600; color: var(--text); }
    .new-chat-btn-mobile { background: var(--brown); color: white; border: none; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
    .new-chat-btn-mobile:active { transform: scale(0.95); }

    .chat-item-mobile { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .chat-item-mobile:active { background: var(--bg-sidebar); }
    .chat-item-mobile .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-sidebar); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 0.5px solid var(--border); overflow: hidden; }
    .chat-item-mobile .avatar .cookie-emoji { font-size: 20px; }
    .chat-item-mobile .info { flex: 1; min-width: 0; }
    .chat-item-mobile .info .name { font-size: 13px; font-weight: 500; color: var(--text); }
    .chat-item-mobile .info .preview { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .chat-item-mobile .time { font-size: 10px; color: var(--text-hint); flex-shrink: 0; }
    .chat-item-mobile .delete-chat-mobile { background: none; border: none; color: var(--text-hint); font-size: 14px; cursor: pointer; padding: 4px; opacity: 0.3; transition: opacity 0.2s; }
    .chat-item-mobile:hover .delete-chat-mobile { opacity: 0.8; }

    #chat-screen-mobile { display: none !important; flex: 1; flex-direction: column; background: var(--bg-main); height: 100%; }
    #chat-screen-mobile.active { display: flex !important; }

    #messages-mobile { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
    #messages-mobile::-webkit-scrollbar { width: 0; }

    .msg-mobile { display: flex; gap: 8px; align-items: flex-start; max-width: 100%; }
    .msg-mobile.user { flex-direction: row-reverse; }
    .msg-mobile .avatar { width: 32px; height: 32px; font-size: 18px; flex-shrink: 0; overflow: hidden; background: var(--bg-sidebar); border: 0.5px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .msg-mobile .avatar .cookie-emoji { font-size: 18px; }
    .msg-mobile .bubble { max-width: 82%; padding: 8px 12px; font-size: 14px; line-height: 1.55; color: var(--text); word-break: break-word; background: var(--bg-sidebar); border: 0.5px solid var(--border); border-radius: 4px 14px 14px 14px; }
    .msg-mobile.user .bubble { background: var(--brown); color: #fdf6ec; border-radius: 14px 4px 14px 14px; }
    .msg-mobile .bubble .code-block pre { font-size: 11px; padding: 6px; }
    .msg-mobile .bubble .gen-image-wrap img { max-height: 180px; }
    .msg-mobile .bubble .run-preview iframe { height: 160px; }

    .welcome-mobile { margin: auto; text-align: center; padding: 16px; }
    .welcome-mobile h2 { font-size: 20px; font-weight: 600; color: var(--text); margin: 6px 0 2px; }
    .welcome-mobile p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    #input-area-mobile { display: flex !important; border-top: 0.5px solid var(--border); padding: 6px 10px 10px; background: var(--bg-main); flex-shrink: 0; padding-bottom: calc(10px + var(--safe-bottom)); }
    #input-row-mobile { display: flex; gap: 6px; align-items: flex-end; width: 100%; }
    .input-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
    .input-actions button { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px; transition: color 0.2s; display: flex; align-items: center; }
    .input-actions button:hover { color: var(--brown); }
    #text-input-mobile { flex: 1; min-height: 32px; max-height: 80px; padding: 6px 10px; border: 0.5px solid var(--border-md); border-radius: 18px; background: var(--bg-sidebar); color: var(--text); font-size: 14px; resize: none; font-family: inherit; line-height: 1.4; outline: none; transition: border-color 0.15s; }
    #text-input-mobile:focus { border-color: var(--brown); }
    #text-input-mobile::placeholder { color: var(--text-hint); font-size: 13px; }
    #send-btn-mobile { width: 36px; height: 36px; flex-shrink: 0; background: var(--brown); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.15s, transform 0.1s; }
    #send-btn-mobile:hover { background: var(--brown-dark); }
    #send-btn-mobile:active { transform: scale(0.92); }
    #send-btn-mobile:disabled { opacity: 0.35; cursor: default; transform: none; }
    #send-btn-mobile i { font-size: 16px; }

    #bottom-nav { display: flex !important; align-items: center; justify-content: space-around; padding: 4px 6px calc(4px + var(--safe-bottom)); background: var(--bg-main); border-top: 0.5px solid var(--border); flex-shrink: 0; min-height: var(--bottom-nav-height); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 1px; background: none; border: none; color: var(--text-hint); font-size: 9px; cursor: pointer; padding: 2px 8px; transition: color 0.2s; font-family: inherit; }
    .nav-item i { font-size: 20px; }
    .nav-item span { font-size: 8px; }
    .nav-item.active { color: var(--brown); }
    .nav-item.active i { color: var(--brown); }
    .nav-item:active { transform: scale(0.92); }

    .donate-btn-mobile { display: inline-flex; align-items: center; gap: 3px; padding: 3px 10px; background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a18; border-radius: 14px; font-weight: 600; font-size: 10px; text-decoration: none; transition: all 0.25s ease; border: none; cursor: pointer; }
    .donate-btn-mobile:active { transform: scale(0.95); }
  }

  @media (max-width: 380px) {
    #topbar-title { font-size: 13px; }
    .chat-item-mobile { padding: 8px 12px; }
    .chat-item-mobile .avatar { width: 32px; height: 32px; font-size: 16px; }
    .chat-item-mobile .avatar .cookie-emoji { font-size: 16px; }
    .msg-mobile .bubble { font-size: 13px; padding: 6px 10px; }
    .msg-mobile .avatar { width: 28px; height: 28px; font-size: 16px; }
    .msg-mobile .avatar .cookie-emoji { font-size: 16px; }
    .msg .avatar { width: 28px; height: 28px; font-size: 16px; }
    .msg .avatar .cookie-emoji { font-size: 16px; }
    #text-input-mobile { font-size: 13px; padding: 5px 8px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- ДЕСКТОП -->
  <div id="sidebar">
    <div id="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" fill="#C4853A"/>
        <circle cx="10" cy="11" r="2" fill="#3B1F0A" opacity="0.9"/>
        <circle cx="19" cy="9" r="1.5" fill="#3B1F0A" opacity="0.9"/>
        <circle cx="22" cy="17" r="1.9" fill="#3B1F0A" opacity="0.9"/>
        <circle cx="13" cy="20" r="1.7" fill="#3B1F0A" opacity="0.9"/>
        <circle cx="20" cy="23" r="1.4" fill="#3B1F0A" opacity="0.9"/>
        <circle cx="8" cy="19" r="1.3" fill="#3B1F0A" opacity="0.7"/>

  if (!text) return text;
  const fixes = {
    'Ð': 'Є', 'Ñ': 'Ї', 'Ð²': 'в', 'Ð³': 'г', 'Ð´': 'д', 'Ðµ': 'е', 'Ð¶': 'ж',
    'Ð·': 'з', 'Ð¸': 'и', 'Ð¹': 'й', 'Ðº': 'к', 'Ð»': 'л', 'Ð¼': 'м', 'Ð½': 'н',

    'Ð': 'А', 'Ð': 'Б', 'Ð': 'В', 'Ð': 'Г', 'Ð': 'Д', 'Ð': 'Е', 'Ð': 'Ж',
    'Ð': 'З', 'Ð': 'И', 'Ð': 'Й', 'Ð': 'К', 'Ð': 'Л', 'Ð': 'М', 'Ð': 'Н',
    'Ð': 'О', 'Ð': 'П', 'Ð¡': 'С', 'Ð¢': 'Т', 'Ð£': 'У', 'Ð¤': 'Ф', 'Ð¥': 'Х',
    'Ð¦': 'Ц', 'Ð§': 'Ч', 'Ð¨': 'Ш', 'Ð©': 'Щ', 'Ðª': 'Ъ', 'Ð«': 'Ы', 'Ð¬': 'Ь',
    'Ð­': 'Э', 'Ð®': 'Ю', 'Ð¯': 'Я', 'Ñ': 'р', 'Ñ': 'с', 'Ñ': 'т', 'Ñ': 'у',
    'Ñ': 'ф', 'Ñ': 'х', 'Ñ': 'ц', 'Ñ': 'ч', 'Ñ': 'ш', 'Ñ': 'щ', 'Ñ': 'ъ',
    'Ñ': 'ы', 'Ñ': 'ь', 'Ñ': 'э', 'Ñ': 'ю', 'Ñ': 'я'
  };
  try { text = text.normalize('NFC'); } catch(e) {}
  for (const [bad, good] of Object.entries(fixes)) {
    text = text.replace(new RegExp(bad, 'g'), good);
  }
  return text;
}

function sanitizeText(text) {
  if (!text) return text;
  text = text.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
  text = fixBrokenUnicode(text);
  return text;
}

function detectLanguage(text) {
  text = sanitizeText(text);
  if (!text) return 'en';
  const ukrLetters = /[іїєґ]/i;
  const rusOnly = /[ёыъэ]/i;
  const cyrillic = /[а-яёіїєґ]/i;
  const ukrWords = ['привіт', 'добрий', 'дякую', 'спасибі', 'будь', 'ласка', 'вибач'];
  const rusWords = ['привет', 'добрый', 'спасибо', 'пожалуйста', 'извини'];
  let ukrScore = 0, rusScore = 0;
  let hasUkr = false, hasRusOnly = false;
  for (const ch of text) {
    if (ukrLetters.test(ch)) { hasUkr = true; ukrScore += 2; }
    if (rusOnly.test(ch)) { hasRusOnly = true; rusScore += 2; }
  }
  const words = text.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  for (const w of words) {
    if (ukrWords.some(x => w.includes(x))) ukrScore += 1.5;
    if (rusWords.some(x => w.includes(x))) rusScore += 1.5;
  }
  if (hasUkr) return 'uk';
  if (hasRusOnly && !hasUkr) return 'ru';
  if (ukrScore > rusScore && ukrScore > 0) return 'uk';
  if (rusScore > ukrScore && rusScore > 0) return 'ru';
  if (cyrillic.test(text)) {
    if (/[а-я]и$/i.test(text) || /[а-я]ю$/i.test(text)) return 'uk';
    if (/[а-я]ы$/i.test(text) || /[а-я]е$/i.test(text)) return 'ru';
  }
  if (/[a-zA-Z]/.test(text)) return 'en';
  return 'en';
}

function isRussian(text) {
  text = sanitizeText(text);
  if (!text) return false;
  if (/[іїєґ]/i.test(text)) return false;
  if (/[ёыъэ]/i.test(text) && !/[іїєґ]/i.test(text)) return true;
  return detectLanguage(text) === 'ru';
}

const cache = new Map();

async function searchDDG(q) {
  const key = 'ddg_' + q.trim().toLowerCase();
  if (cache.has(key)) { const c = cache.get(key); if (Date.now() - c.ts < 3600000) return c.data; }
  try {
    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('DDG error');
    const d = await r.json();
    const res = [];
    if (d.AbstractText) res.push({ title: d.Heading || 'Result', snippet: d.AbstractText, url: d.AbstractURL || '#' });
    if (d.RelatedTopics) {
      d.RelatedTopics.forEach(t => {
        if (t.Text && t.Text.length > 10) {
          const parts = t.Text.split(' - ');
          res.push({ title: parts[0] || 'Related', snippet: parts.slice(1).join(' - ') || t.Text, url: t.FirstURL || '#' });
        }
      });
    }
    cache.set(key, { data: res, ts: Date.now() });
    return res;
  } catch (e) { return []; }
}

async function searchQwant(q) {
  const key = 'qw_' + q.trim().toLowerCase();
  if (cache.has(key)) { const c = cache.get(key); if (Date.now() - c.ts < 3600000) return c.data; }
  try {
    const url = `https://api.qwant.com/v3/search/web?q=${encodeURIComponent(q)}&count=10&locale=uk_UA&safesearch=1`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Qwant error');
    const d = await r.json();
    const res = [];
    if (d.status === 'success' && d.data?.result?.items) {
      d.data.result.items.forEach(item => {
        res.push({
          title: item.title.replace(/<[^>]*>/g, ''),
          snippet: item.desc.replace(/<[^>]*>/g, ''),
          url: item.url
        });
      });
    }
    cache.set(key, { data: res, ts: Date.now() });
    return res;
  } catch (e) { return []; }
}

async function searchWeb(q) {
  let r = await searchDDG(q);
  if (!r || r.length < 3) {
    const qr = await searchQwant(q);
    const seen = new Set();
    const combined = [...r, ...qr];
    r = combined.filter(x => { const k = x.url; if (seen.has(k)) return false; seen.add(k); return true; });
  }
  return r;
}

  if (isRunnable) actions += `<button onclick="runCodeM('${id}', \`${code.replace(/`/g,'\\`')}\`)"><i class="ti ti-player-play" style="font-size:9px;"></i></button>`;
  if (isPy) actions += `<button onclick="runPythonM('${id}')"><i class="ti ti-brand-python" style="font-size:9px;"></i></button>`;
  return `<div class="code-block" id="${id}">
    <div class="code-header"><span class="lang">${label}</span><div class="code-actions">${actions}</div></div>
    <pre><code class="hljs language-${label}">${safe}</code></pre>
  </div>`;
}

function copyCodeM(id) {
  const el = document.getElementById(id);

  const code = el.querySelector('pre code').textContent;

function runCodeM(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  let existing = el.nextElementSibling;
  if (existing && existing.classList.contains('run-preview')) existing.remove();
  const preview = document.createElement('div');
  preview.className = 'run-preview';
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts';
  preview.appendChild(iframe);
  el.insertAdjacentElement('afterend', preview);
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open(); doc.write(code); doc.close();
  scrollChat();
}

let pyodideReady = false;
let pyodideInstance = null;

async function runPythonM(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const code = el.querySelector('pre code').textContent;
  try {
    if (!pyodideReady) {
      toast('⏳ Завантаження Python...');
      pyodideInstance = await loadPyodide();
      pyodideReady = true;
      toast('✅ Python готовий');

    toast('⏳ Виконання...');
    const result = await pyodideInstance.runPythonAsync(code);
    toast('✅ Готово');
    let existing = el.nextElementSibling;
    if (existing && existing.classList.contains('run-preview')) existing.remove();
    const preview = document.createElement('div');
    preview.className = 'run-preview';

    preview.textContent = result || '✅ Виконано';

let chats = [], activeChatId = null, loading = false;
let currentView = 'chats';
const isMobile = () => window.innerWidth <= 600;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function scrollChat() {
  const container = isMobile() ? document.getElementById('messages-mobile') : document.getElementById('messages');
  if (container) container.scrollTop = container.scrollHeight;
}

function fmt(text) {
  text = sanitizeText(text);
  if (!text) return '';
  const blocks = [];
  let h = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = blocks.length;
    blocks.push({ lang: lang.trim(), code: code.trim() });
    return `%%CODE_BLOCK_${idx}%%`;
  });
  h = esc(h);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/\n/g, '<br>');
  blocks.forEach((b, i) => {
    h = h.replace(`%%CODE_BLOCK_${i}%%`, renderCodeBlock(b.code, b.lang));
  });
  setTimeout(() => {
    const container = isMobile() ? '#messages-mobile' : '#messages';
    document.querySelectorAll(`${container} .code-block pre code`).forEach(el => hljs.highlightElement(el));
  }, 50);
  return h;
}

function createChat(title) {
  const id = genId();
  chats.push({ id, title: title || t('new_chat'), messages: [], created: new Date().toISOString() });
  activeChatId = id;
  renderChatList();
  renderChatListMobile();
  saveChats();
  return id;
}

function deleteChat(id) {
  if (!confirm(t('delete_confirm'))) return;
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) {
    activeChatId = chats.length > 0 ? chats[chats.length-1].id : null;
    if (activeChatId) {
      const c = chats.find(x => x.id === activeChatId);
      if (c) { updateTitle(c.title); renderMsgs(c.messages); }
    } else { createChat(t('new_chat')); showWelcome(); }
  }
  renderChatList();
  renderChatListMobile();
  saveChats();
}

function renderChatList() {
  const container = document.getElementById('chat-list');
  if (!container) return;
  container.innerHTML = '';
  if (!chats.length) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-hint);font-size:13px;">${t('no_chats')}</div>`;
    return;
  }
  [...chats].reverse().forEach(c => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
    div.innerHTML = `<i class="ti ti-message"></i> ${esc(c.title)}<span class="delete-chat" data-id="${c.id}">✕</span>`;
    div.addEventListener('click', () => {
      activeChatId = c.id;
      updateTitle(c.title);
      renderMsgs(c.messages);
      renderChatList();
      renderChatListMobile();
    });
    const del = div.querySelector('.delete-chat');
    del.addEventListener('click', (e) => { e.stopPropagation(); deleteChat(c.id); });
    container.appendChild(div);
  });
}

function renderChatListMobile() {
  const container = document.getElementById('chat-list-mobile');
  if (!container) return;
  container.innerHTML = '';
  if (!chats.length) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-hint);font-size:13px;">${t('no_chats')}</div>`;
    return;
  }
  [...chats].reverse().forEach(c => {

function showWelcome() {

function renderMsgs(msgs) {
  const container = isMobile() ? document.getElementById('messages-mobile') : document.getElementById('messages');
  if (!container) return;
  if (!msgs || !msgs.length) { showWelcome(); return; }
  container.innerHTML = '';
  msgs.forEach(m => {
    const role = m.role;
    const text = m.text;
    const imagePrompt = m.imagePrompt;
    const wrap = document.createElement('div');
    wrap.className = isMobile() ? `msg-mobile ${role}` : `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const bt = document.createElement('span');
    bt.innerHTML = fmt(text);
    bubble.appendChild(bt);

    if (imagePrompt && role === 'ai') {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'gen-image-wrap';
      imgWrap.innerHTML = `<div class="img-generating"><div class="typing"><span></span><span></span><span></span></div> Генерую...</div>`;
      bubble.appendChild(imgWrap);
      const img = new Image();
      const url = imgUrl(imagePrompt);
      img.onload = () => {
        imgWrap.innerHTML = `<img src="${url}" alt="${esc(imagePrompt)}"><div class="img-caption">🎨 ${esc(imagePrompt.slice(0,60))}</div>`;
        scrollChat();
      };
      img.onerror = () => { imgWrap.innerHTML = `<div style="color:var(--text-muted);font-size:12px;">⚠️ Помилка генерації</div>`; };
      img.src = url;
    }

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    if (role === 'ai') {
      avatar.innerHTML = `<span class="cookie-emoji">🍪</span>`;
    } else {
      avatar.innerHTML = `<span style="font-size:14px;">👤</span>`;
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    container.appendChild(wrap);
  });
  scrollChat();
}

function showTyping() {
  const container = isMobile() ? document.getElementById('messages-mobile') : document.getElementById('messages');

function rmTyping() {
  const el = document.getElementById('typ');

    const avatar = el.querySelector('.avatar');

async function sendMessage() {
  const input = isMobile() ? document.getElementById('text-input-mobile') : document.getElementById('text-input');
  const text = input ? input.value.trim() : '';
  if (!text || loading) return;

  const lang = detectLanguage(text);
  const isRus = isRussian(text);

  if (!activeChatId) createChat(text.slice(0, 30));
  const chat = chats.find(c => c.id === activeChatId);
  if (!chat) return;

  const imgReq = isImage(text);
  const imgPrompt = imgReq ? extractPrompt(text) : null;

  chat.messages.push({ role: 'user', text, time: Date.now() });
  if (chat.messages.length === 1) { chat.title = text.slice(0, 32); updateTitle(chat.title); renderChatList(); renderChatListMobile(); }

  const container = isMobile() ? document.getElementById('messages-mobile') : document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = isMobile() ? `msg-mobile user` : `msg user`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const bt = document.createElement('span');
  bt.innerHTML = fmt(text);
  bubble.appendChild(bt);
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = `<span style="font-size:14px;">👤</span>`;
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  if (input) { input.value = ''; input.style.height = ''; }
  loading = true;
  const sendBtn = isMobile() ? document.getElementById('send-btn-mobile') : document.getElementById('send-btn');
  if (sendBtn) sendBtn.disabled = true;
  showTyping();

  try {
    let ctx = '';
    let results = [];
    if (needSearch(text)) {
      results = await searchWeb(text);
      if (results.length) {
        ctx = '\n\nАктуальна інформація:\n' +
          results.slice(0, 4).map((r, i) => `${i+1}. ${r.title}\n   ${r.snippet.slice(0, 300)}`).join('\n');
        const src = results.slice(0, 3).map(r => r.url).filter(u => u && u !== '#');
        if (src.length) ctx += '\n\nДжерела: ' + src.join(', ');
      }
    }

    const base = `Ти досвідчений програміст.
Стиль: відповідай чітко, по суті, без зайвих слів. Код: коротко поясни ідею (1-2 речення), покажи код з коментарями, додай складність.
Мова: ${getSystemPrompt(lang)}`;

    const sys = base + (ctx ? '\n\nІнформація з пошуку:\n' + ctx : '');

    const msgs = [
      { role: 'system', content: sys },
      ...chat.messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }))
    ];

    if (isRus) {
      msgs.splice(1, 0, { role: 'system', content: `Відповідай українською. Спочатку напиши: "${getWarning()}"` });
    }

    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: msgs, max_tokens: 4096, temperature: 0.7 })
    });

    const data = await resp.json();
    rmTyping();
    if (data.error) throw new Error(data.error.message);

    let reply = data.choices?.[0]?.message?.content || '…';
    reply = sanitizeText(reply);

    if (isRus && !reply.includes('відповідаю') && !reply.includes('спілкуюся')) {
      reply = getWarning() + '\n\n' + reply;
    }

    chat.messages.push({ role: 'ai', text: reply, imagePrompt: imgPrompt, time: Date.now() });
    const container2 = isMobile() ? document.getElementById('messages-mobile') : document.getElementById('messages');
    const wrap2 = document.createElement('div');
    wrap2.className = isMobile() ? `msg-mobile ai` : `msg ai`;
    const bubble2 = document.createElement('div');
    bubble2.className = 'bubble';
    const bt2 = document.createElement('span');
    bt2.innerHTML = fmt(reply);
    bubble2.appendChild(bt2);

    if (imgPrompt) {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'gen-image-wrap';
      imgWrap.innerHTML = `<div class="img-generating"><div class="typing"><span></span><span></span><span></span></div> Генерую...</div>`;
      bubble2.appendChild(imgWrap);
      const img = new Image();
      const url = imgUrl(imgPrompt);
      img.onload = () => {
        imgWrap.innerHTML = `<img src="${url}" alt="${esc(imgPrompt)}"><div class="img-caption">🎨 ${esc(imgPrompt.slice(0,60))}</div>`;
        scrollChat();
      };
      img.onerror = () => { imgWrap.innerHTML = `<div style="color:var(--text-muted);font-size:12px;">⚠️ Помилка генерації</div>`; };
      img.src = url;
    }

    const avatar2 = document.createElement('div');
    avatar2.className = 'avatar';
    avatar2.innerHTML = `<span class="cookie-emoji">🍪</span>`;
    wrap2.appendChild(avatar2);
    wrap2.appendChild(bubble2);
    container2.appendChild(wrap2);
    scrollChat();
    saveChats();
    renderChatList();
    renderChatListMobile();

  } catch (e) {
    rmTyping();
    const container2 = isMobile() ? document.getElementById('messages-mobile') : document.getElementById('messages');
    const wrap2 = document.createElement('div');
    wrap2.className = isMobile() ? `msg-mobile ai` : `msg ai`;
    const bubble2 = document.createElement('div');
    bubble2.className = 'bubble';
    const bt2 = document.createElement('span');
    bt2.innerHTML = '⚠️ ' + esc(e.message);
    bubble2.appendChild(bt2);
    const avatar2 = document.createElement('div');
    avatar2.className = 'avatar';
    avatar2.innerHTML = `<span class="cookie-emoji">🍪</span>`;
    wrap2.appendChild(avatar2);
    wrap2.appendChild(bubble2);
    container2.appendChild(wrap2);
    scrollChat();
  }

  loading = false;
  const sendBtn2 = isMobile() ? document.getElementById('send-btn-mobile') : document.getElementById('send-btn');
  if (sendBtn2) sendBtn2.disabled = false;
}

    saveAs(blob, `coockie_chats_${new Date().toISOString().slice(0, 10)}.zip`);
    toast('✅ ' + t('exported'));
  } catch(e) { toast('❌ ' + e.message); }
});

document.getElementById('import-file')?.addEventListener('change', async function(e) {
  const file = e.target.files[0]; if (!file) return;
  try {
    const zip = await JSZip.loadAsync(file);
    const chatFile = zip.file('chats.json');
    if (!chatFile) { toast('❌ ' + t('invalid_format')); return; }
    const data = JSON.parse(await chatFile.async('text'));
    if (!data.chats || !Array.isArray(data.chats)) { toast('❌ ' + t('invalid_data')); return; }
    if (!confirm(t('import_confirm').replace('{count}', data.chats.length))) return;
    chats = data.chats;
    saveChats();
    loadChats();
    toast('✅ ' + t('imported').replace('{count}', chats.length));
    this.value = '';
  } catch(e) { toast('❌ ' + e.message); this.value = ''; }
});

// ============================================================
// 16. ЗАВАНТАЖЕННЯ
// ============================================================
const savedLang = localStorage.getItem('coockie_mobile_lang') || 'uk';
currentLang = savedLang;
document.getElementById('lang-select').value = savedLang;
document.getElementById('lang-select-mobile').value = savedLang;
applyTranslations();
loadChats();

if (isMobile()) {
  showChatListScreen();
} else {
  document.getElementById('sidebar').style.display = 'flex';
}

console.log('🍪 Coockie AI з анімацією готовий!');
</script>
