<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brown: #8B6340; --brown-dark: #5C3D1E;
    --bg: #f5f5f4; --bg-main: #ffffff; --bg-sidebar: #fafaf9;
    --text: #1a1a18; --text-muted: #6b6b67; --text-hint: #a8a8a2;
    --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.14);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg-main: #1c1c1b; --bg-sidebar: #212120;
      --text: #f0f0ec; --text-muted: #9a9a94; --text-hint: #5a5a56;
      --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.13);
    }
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: system-ui, sans-serif; }
  #app { display: flex; height: 100vh; }

  /* SIDEBAR */
  #sidebar { width: 230px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; }
  #logo { padding: 16px 15px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border); }
  #logo-text { font-size: 18px; font-weight: 600; color: var(--text); }
  #logo-text em { color: var(--brown); font-style: normal; }
  #new-chat-btn { margin: 10px 10px 4px; padding: 8px 12px; background: transparent; border: 0.5px solid var(--border-md); border-radius: var(--radius); color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: all 0.15s; }
  #new-chat-btn:hover { background: var(--bg-main); color: var(--text); }
  #chats-label { padding: 8px 15px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-hint); }
  #chat-list { flex: 1; overflow-y: auto; padding: 0 7px 10px; }
  #chat-list::-webkit-scrollbar { width: 3px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
  .chat-item { padding: 6px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background 0.12s; display: flex; align-items: center; gap: 7px; }
  .chat-item:hover { background: var(--bg-main); color: var(--text); }
  .chat-item.active { background: var(--bg-main); color: var(--text); font-weight: 500; }
  .chat-item .delete-chat { margin-left: auto; opacity: 0.3; cursor: pointer; font-size: 12px; padding: 0 4px; flex-shrink: 0; }
  .chat-item:hover .delete-chat { opacity: 0.8; }
  #backup-buttons { padding: 8px 10px; border-top: 0.5px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
  #backup-buttons button { padding: 5px 10px; font-size: 11px; border: 0.5px solid var(--border-md); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
  #backup-buttons button:hover { background: var(--bg-main); color: var(--text); border-color: var(--brown); }
  #backup-buttons .import-btn { position: relative; overflow: hidden; }
  #backup-buttons .import-btn input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-main); }
  #topbar { padding: 10px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  #topbar-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #model-badge { font-size: 11px; padding: 2px 10px; background: var(--bg-sidebar); border: 0.5px solid var(--border); border-radius: 20px; color: var(--text-muted); white-space: nowrap; }

  /* MESSAGES */
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }
  .welcome { margin: auto; text-align: center; padding: 20px; max-width: 420px; }
  .welcome h2 { font-size: 20px; font-weight: 600; color: var(--text); margin: 10px 0 4px; }
  .welcome p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  .caps-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
  .cap-badge { padding: 4px 10px; background: var(--bg-sidebar); border: 0.5px solid var(--border-md); border-radius: 20px; font-size: 11px; color: var(--text-muted); }

  .msg { display: flex; gap: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; margin-top: 1px; }

  .avatar.user { background: #dbeafe; color: #1d4ed8; font-weight: 500; }

  .msg.user .bubble { background: var(--brown); color: #fdf6ec; border-radius: 14px 4px 14px 14px; }

  /* CODE BLOCKS */
  .code-block { margin: 8px 0; border-radius: 8px; overflow: hidden; border: 0.5px solid var(--border-md); }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; background: rgba(0,0,0,0.08); font-size: 11px; color: var(--text-muted); }
  .code-header .lang { font-weight: 500; }
  .code-actions { display: flex; gap: 4px; }
  .code-actions button { padding: 2px 8px; font-size: 11px; border: 0.5px solid var(--border-md); border-radius: 4px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 3px; }
  .code-actions button:hover { background: var(--bg-main); color: var(--text); }
  .code-block pre { margin: 0; padding: 12px; background: rgba(0,0,0,0.04); overflow-x: auto; font-size: 13px; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.5; }
  .msg.ai .bubble code:not(.code-block code) { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: monospace; }
  .msg.user .bubble code { background: rgba(255,255,255,0.2); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: monospace; }

  /* GENERATED IMAGE */
  .gen-image-wrap { margin: 8px 0; }
  .gen-image-wrap img { max-width: 100%; max-height: 300px; border-radius: 10px; display: block; border: 0.5px solid var(--border-md); }
  .gen-image-wrap .img-caption { font-size: 11px; color: var(--text-hint); margin-top: 4px; }
  .img-generating { display: flex; align-items: center; gap: 8px; padding: 12px; background: var(--bg-sidebar); border-radius: 10px; border: 0.5px solid var(--border); font-size: 13px; color: var(--text-muted); }

  /* RUN PREVIEW */
  .run-preview { margin: 8px 0; border: 0.5px solid var(--border-md); border-radius: 8px; overflow: hidden; }
  .run-preview iframe { width: 100%; height: 300px; border: none; background: white; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
  .typing span { width: 7px; height: 7px; background: var(--text-hint); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2}40%{opacity:1} }

  #input-area { border-top: 0.5px solid var(--border); padding: 12px 16px; }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #text-input { flex: 1; min-height: 36px; max-height: 120px; padding: 8px 12px; border: 0.5px solid var(--border-md); border-radius: var(--radius); background: var(--bg-main); color: var(--text); font-size: 14px; resize: none; font-family: inherit; line-height: 1.5; outline: none; transition: border-color 0.15s; }
  #text-input:focus { border-color: var(--brown); }
  #text-input::placeholder { color: var(--text-hint); }
  #send-btn { width: 36px; height: 36px; flex-shrink: 0; background: var(--brown); border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.15s, transform 0.1s; }
  #send-btn:hover { background: var(--brown-dark); }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.38; cursor: default; transform: none; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 24px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>

<script>
// ============================================================
// DUCKDUCKGO ПОШУК
// ============================================================
const searchCache = new Map();

async function searchDuckDuckGo(query) {
  const cacheKey = query.toLowerCase().trim();
  if (searchCache.has(cacheKey)) {
    const cached = searchCache.get(cacheKey);
    if (Date.now() - cached.timestamp < 3600000) return cached.data;
  }
  try {
    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('DDG error');
    const data = await response.json();
    const results = [];
    if (data.AbstractText) results.push({ title: data.Heading || 'Результат', snippet: data.AbstractText, url: data.AbstractURL || '#' });
    if (data.RelatedTopics) {
      data.RelatedTopics.forEach(topic => {
        if (topic.Text && topic.Text.length > 10) {
          const parts = topic.Text.split(' - ');
          results.push({ title: parts[0] || 'Пов\'язане', snippet: parts.slice(1).join(' - ') || topic.Text, url: topic.FirstURL || '#' });
        }
      });
    }
    searchCache.set(cacheKey, { data: results, timestamp: Date.now() });
    return results;
  } catch (e) { return []; }
}

function needsInternetSearch(query) {
  const patterns = [/сьогодн/i,/зараз/i,/новин/i,/актуальн/i,/останн/i,/поточн/i,/свіж/i,/погод/i,/курс\s+(валюти|долару|євро|гривні)/i,/знайди/i,/пошук/i,/перевір/i,/дізнайся/i,/що\s+(сталося|відбувається)/i];
  return patterns.some(p => p.test(query));
}

// ============================================================
// ГЕНЕРАЦІЯ ЗОБРАЖЕНЬ (Pollinations.ai — без ключа!)
// ============================================================
function isImageRequest(query) {
  const patterns = [/намалюй/i,/згенеруй\s+(зображення|картинку|малюнок|фото)/i,/створи\s+(зображення|картинку|малюнок)/i,/зроби\s+(зображення|картинку|малюнок)/i,/покажи\s+як\s+виглядає/i,/generate\s+image/i,/draw\s+me/i,/малюнок\s+з/i,/картинка\s+з/i];
  return patterns.some(p => p.test(query));
}

function extractImagePrompt(query) {
  return query
    .replace(/намалюй\s*/i, '')
    .replace(/згенеруй\s+(зображення|картинку|малюнок|фото)\s*/i, '')
    .replace(/створи\s+(зображення|картинку|малюнок)\s*/i, '')
    .replace(/зроби\s+(зображення|картинку|малюнок)\s*/i, '')
    .replace(/покажи\s+як\s+виглядає\s*/i, '')
    .trim();
}

function buildImageUrl(prompt) {
  const encoded = encodeURIComponent(prompt);
  return `https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random()*99999)}`;
}

function addImageBubble(bubble, prompt) {
  const wrap = document.createElement('div');
  wrap.className = 'gen-image-wrap';
  wrap.innerHTML = `<div class="img-generating"><div class="typing"><span></span><span></span><span></span></div> Генерую зображення...</div>`;
  bubble.appendChild(wrap);
  scrollBot();

  const img = new Image();
  const url = buildImageUrl(prompt);
  img.onload = () => {
    wrap.innerHTML = `<img src="${url}" alt="${esc(prompt)}"><div class="img-caption">🎨 Pollinations.ai · "${esc(prompt.slice(0,60))}"</div>`;
    scrollBot();
  };
  img.onerror = () => {
    wrap.innerHTML = `<div style="color:var(--text-muted);font-size:13px;">⚠️ Не вдалося згенерувати зображення</div>`;
  };
  img.src = url;
}

// ============================================================
// КОД — підсвітка та виконання
// ============================================================
function renderCodeBlock(code, lang) {
  const id = 'cb_' + Math.random().toString(36).slice(2);
  const isRunnable = ['html', 'javascript', 'js', 'css'].includes((lang||'').toLowerCase());
  const safeCode = esc(code);
  const langLabel = lang || 'code';

  let actionsHtml = `<button onclick="copyCode('${id}')"><i class="ti ti-copy" style="font-size:11px;"></i> Копіювати</button>`;
  if (isRunnable) actionsHtml += `<button onclick="runCode('${id}', \`${code.replace(/`/g,'\\`')}\`)"><i class="ti ti-player-play" style="font-size:11px;"></i> Запустити</button>`;

  return `<div class="code-block" id="${id}">
    <div class="code-header">
      <span class="lang">${langLabel}</span>
      <div class="code-actions">${actionsHtml}</div>
    </div>
    <pre><code>${safeCode}</code></pre>
  </div>`;
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const code = el.querySelector('pre code').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('✅ Код скопійовано!')).catch(() => showToast('❌ Не вдалося скопіювати'));
}

function runCode(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  let existing = el.nextElementSibling;
  if (existing && existing.classList.contains('run-preview')) existing.remove();
  const preview = document.createElement('div');
  preview.className = 'run-preview';
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts';
  preview.appendChild(iframe);
  el.insertAdjacentElement('afterend', preview);
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open(); doc.write(code); doc.close();
  scrollBot();
}

let chats = [], activeChatId = null, loading = false;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  // Спочатку витягуємо блоки коду щоб не чіпати їх вміст
  const codeBlocks = [];
  let h = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang.trim(), code: code.trim() });
    return `%%CODE_BLOCK_${idx}%%`;
  });

  // Рендеримо markdown
  h = esc(h);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  h = h.replace(/\n/g, '<br>');

  // Вставляємо блоки коду назад
  codeBlocks.forEach((b, i) => {
    h = h.replace(`%%CODE_BLOCK_${i}%%`, renderCodeBlock(b.code, b.lang));
  });

  return h;
}

function createChat(title) {
  const id = genId();
  chats.push({ id, title: title || 'Новий чат', messages: [], created: new Date().toISOString() });
  activeChatId = id; renderList(); saveLocalChats(); return id;
}

function deleteChat(id) {
  if (!confirm('Видалити цей чат?')) return;
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) {
    activeChatId = chats.length > 0 ? chats[chats.length-1].id : null;
    if (activeChatId) { const c = chats.find(c=>c.id===activeChatId); topbarTitle.textContent=c.title; renderMsgs(c.messages); }
    else { createChat('Новий чат'); showWelcome(); }
  }
  renderList(); saveLocalChats();
}

function renderList() {
  chatListEl.innerHTML = '';
  [...chats].reverse().forEach(c => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
    el.innerHTML = `<i class="ti ti-message" aria-hidden="true"></i>${esc(c.title)}`;
    el.onclick = () => { activeChatId=c.id; topbarTitle.textContent=c.title; renderMsgs(c.messages); renderList(); };
    const del = document.createElement('span');
    del.className = 'delete-chat'; del.innerHTML = '✕';
    del.onclick = e => { e.stopPropagation(); deleteChat(c.id); };
    el.appendChild(del); chatListEl.appendChild(el);
  });
}

      <circle cx="34" cy="27" r="2.6" fill="#3B1F0A" opacity="0.85"/>
      <circle cx="21" cy="33" r="2.3" fill="#3B1F0A" opacity="0.85"/>
      <circle cx="32" cy="35" r="1.9" fill="#3B1F0A" opacity="0.85"/>
      <circle cx="13" cy="30" r="1.7" fill="#3B1F0A" opacity="0.7"/>
    </svg>
    <h2>🍪 Coockie AI</h2>
    <p>Groq + Llama 3.3 70B — розумний, швидкий, безкоштовний!</p>
    <span class="free-badge">✓ Необмежено · Без реєстрації</span>
    <div class="caps-row">
      <span class="cap-badge">🏴‍☠️ DuckDuckGo пошук</span>
      <span class="cap-badge">🎨 Генерація зображень</span>
      <span class="cap-badge">💻 Запуск коду</span>
      <span class="cap-badge">💾 Збереження чатів</span>
    </div>
  </div>`;
}

function renderMsgs(msgs) {
  if (!msgs || !msgs.length) { showWelcome(); return; }
  messagesEl.innerHTML = '';
  msgs.forEach(m => addBubble(m.role, m.text, m.imagePrompt, false));
  scrollBot();
}

function addBubble(role, text, imagePrompt, scroll = true) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const bt = document.createElement('span');
  bt.innerHTML = fmt(text);
  bubble.appendChild(bt);

  // Якщо є imagePrompt — генеруємо зображення
  if (imagePrompt && role === 'ai') addImageBubble(bubble, imagePrompt);

  wrap.innerHTML = `<div class="avatar ${role}">${role === 'ai' ? '🍪' : '👤'}</div>`;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  if (scroll) scrollBot();
}

function showTyping() {
  const w = document.createElement('div'); w.className = 'msg ai'; w.id = 'typ';
  w.innerHTML = `<div class="avatar ai">🍪</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(w); scrollBot();
}
function rmTyping() { const e = document.getElementById('typ'); if (e) e.remove(); }
function scrollBot() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function saveLocalChats() { localStorage.setItem('coockie_chats', JSON.stringify(chats)); }

function loadLocalChats() {
  try { chats = JSON.parse(localStorage.getItem('coockie_chats') || '[]'); if (!Array.isArray(chats)) chats = []; } catch(e) { chats = []; }
  if (chats.length === 0) { createChat('Ласкаво просимо'); showWelcome(); return; }
  renderList();
  activeChatId = chats[chats.length-1].id;
  const chat = chats.find(c=>c.id===activeChatId);
  if (chat) { topbarTitle.textContent = chat.title; renderMsgs(chat.messages); }
}

// ============================================================
// ВІДПРАВКА
// ============================================================
async function send() {
  const text = textInput.value.trim();
  if (!text || loading) return;
  

  if (!activeChatId) createChat(text.slice(0, 30));
  const chat = chats.find(c => c.id === activeChatId);
  if (!chat) return;

  const imgRequest = isImageRequest(text);
  const imgPrompt = imgRequest ? extractImagePrompt(text) : null;

  chat.messages.push({ role: 'user', text });
  if (chat.messages.length === 1) { chat.title = text.slice(0, 32); topbarTitle.textContent = chat.title; renderList(); }

  addBubble('user', text, null);
  textInput.value = ''; textInput.style.height = '';
  loading = true; sendBtn.disabled = true; showTyping();

  try {
    let searchContext = '';
    if (needsInternetSearch(text)) {
      const results = await searchDuckDuckGo(text);
      if (results.length > 0) {
        searchContext = '\n\nАктуальна інформація з DuckDuckGo:\n' +
          results.slice(0,5).map((r,i) => `${i+1}. ${r.title}: ${r.snippet.slice(0,300)}`).join('\n');
        const sources = results.slice(0,3).map(r=>r.url).filter(u=>u!=='#');
        if (sources.length) searchContext += '\nДжерела: ' + sources.join(', ');
      }
    }

    const systemPrompt = `Ти Coockie — розумний, дружній ШІ-асистент. Відповідай мовою користувача. Якщо пишуть українською — відповідай українською.
Ти вмієш:
- Відповідати на питання та вести бесіду
- Писати та пояснювати код (використовуй \`\`\`мова ... \`\`\` для блоків коду)
- Генерувати зображення (якщо просять намалювати — просто опиши що намалюєш, зображення з'явиться автоматично)
${searchContext ? searchContext : ''}`;

    const messages = [
      { role: 'system', content: systemPrompt },
      ...chat.messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }))
    ];

    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, max_tokens: 2000, temperature: 0.7 })
    });

    const data = await resp.json();
    rmTyping();
    if (data.error) throw new Error(data.error.message);

    let reply = data.choices?.[0]?.message?.content || '…';

    // Додаємо джерела якщо був пошук
    if (searchContext && !reply.includes('Джерела')) {
      const results = await searchDuckDuckGo(text);
      const sources = results.slice(0,3).map(r=>r.url).filter(u=>u!=='#');
      if (sources.length) reply += '\n\n📎 Джерела: ' + sources.join(', ');
    }

    chat.messages.push({ role: 'ai', text: reply, imagePrompt: imgPrompt });
    addBubble('ai', reply, imgPrompt);
    saveLocalChats();

  } catch (e) {
    rmTyping();
    addBubble('ai', '⚠️ Помилка: ' + esc(e.message));
  }

  loading = false; sendBtn.disabled = false;
}

// ============================================================
// ЕКСПОРТ / ІМПОРТ
// ============================================================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('export-btn').onclick = async function() {
  if (!chats.length) { showToast('❌ Немає чатів'); return; }
  try {
    const zip = new JSZip();
    zip.file('chats.json', JSON.stringify({ version: '1.0', exportedAt: new Date().toISOString(), chats }, null, 2));
    chats.forEach(c => {
      const name = c.title.replace(/[^a-z0-9]/gi,'_').slice(0,30);
      zip.file(`chats/${name}_${c.id}.json`, JSON.stringify(c, null, 2));
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    saveAs(blob, `coockie_chats_${new Date().toISOString().slice(0,10)}.zip`);
    showToast('✅ Чати експортовано!');
  } catch(e) { showToast('❌ ' + e.message); }
};

document.getElementById('import-file').onchange = async function(e) {
  const file = e.target.files[0]; if (!file) return;
  try {
    const zip = await JSZip.loadAsync(file);
    const chatFile = zip.file('chats.json');
    if (!chatFile) { showToast('❌ Невірний формат'); return; }
    const data = JSON.parse(await chatFile.async('text'));
    if (!data.chats || !Array.isArray(data.chats)) { showToast('❌ Невірні дані'); return; }
    if (!confirm(`Знайдено ${data.chats.length} чатів. Імпортувати? (Поточні замінять)`)) return;
    chats = data.chats; saveLocalChats(); loadLocalChats();
    showToast(`✅ Імпортовано ${chats.length} чатів!`);
    this.value = '';
  } catch(e) { showToast('❌ ' + e.message); this.value = ''; }
};

// ============================================================
// ОБРОБНИКИ
// ============================================================
sendBtn.onclick = send;
textInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
textInput.addEventListener('input', () => { textInput.style.height = ''; textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px'; });
document.getElementById('new-chat-btn').onclick = () => { createChat('Новий чат'); topbarTitle.textContent = 'Новий чат'; showWelcome(); saveLocalChats(); };

loadLocalChats();
console.log('🍪 Coockie AI v3 готовий! DDG + Pollinations + Code');
</script>
</body>
