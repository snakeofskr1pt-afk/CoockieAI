<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brown: #8B6340; --brown-dark: #5C3D1E;
    --bg: #f5f5f4; --bg-main: #ffffff; --bg-sidebar: #fafaf9;
    --text: #1a1a18; --text-muted: #6b6b67; --text-hint: #a8a8a2;
    --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.14);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg-main: #1c1c1b; --bg-sidebar: #212120;
      --text: #f0f0ec; --text-muted: #9a9a94; --text-hint: #5a5a56;
      --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.13);
    }
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: system-ui, sans-serif; }
  #app { display: flex; height: 100vh; }

  #sidebar { width: 200px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; }
  #logo { padding: 14px 12px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--border); }
  #logo-text { font-size: 17px; font-weight: 600; color: var(--text); }
  #logo-text em { color: var(--brown); font-style: normal; }
  #new-chat-btn { margin: 8px 8px 4px; padding: 7px 10px; background: transparent; border: 0.5px solid var(--border-md); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  #new-chat-btn:hover { background: var(--bg-main); color: var(--text); }
  #chats-label { padding: 6px 12px 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-hint); }
  #chat-list { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
  #chat-list::-webkit-scrollbar { width: 3px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
  .chat-item { padding: 5px 8px; border-radius: var(--radius); cursor: pointer; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background 0.12s; display: flex; align-items: center; gap: 6px; }
  .chat-item:hover { background: var(--bg-main); color: var(--text); }
  .chat-item.active { background: var(--bg-main); color: var(--text); font-weight: 500; }
  .chat-item .delete-chat { margin-left: auto; opacity: 0.3; cursor: pointer; font-size: 11px; padding: 0 3px; flex-shrink: 0; }
  .chat-item:hover .delete-chat { opacity: 0.8; }
  #backup-buttons { padding: 6px 8px; border-top: 0.5px solid var(--border); display: flex; gap: 4px; flex-wrap: wrap; }
  #backup-buttons button { padding: 4px 8px; font-size: 10px; border: 0.5px solid var(--border-md); border-radius: 5px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 3px; flex: 1; justify-content: center; }
  #backup-buttons button:hover { background: var(--bg-main); color: var(--text); border-color: var(--brown); }
  #backup-buttons .import-btn { position: relative; overflow: hidden; }
  #backup-buttons .import-btn input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-main); }
  #api-key-bar { padding: 5px 14px; background: #fef3c7; border-bottom: 0.5px solid #fcd34d; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #92400e; flex-wrap: wrap; }
  #api-key-bar.saved { background: #f0fdf4; border-color: #86efac; color: #166534; }
  #api-key-bar input { flex: 1; min-width: 120px; padding: 3px 6px; border: 0.5px solid #fcd34d; border-radius: 5px; font-size: 11px; background: white; color: #1a1a18; outline: none; font-family: monospace; }
  #api-key-bar input:focus { border-color: var(--brown); }
  #api-key-bar button { padding: 3px 10px; background: var(--brown); color: white; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; }
  #api-key-bar a { color: inherit; font-weight: 500; font-size: 11px; }
  #topbar { padding: 8px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
  #topbar-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }

  .welcome { margin: auto; text-align: center; padding: 16px; max-width: 380px; }
  .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); margin: 8px 0 4px; }
  .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .free-badge { display: inline-block; margin-top: 8px; padding: 3px 10px; background: #dcfce7; color: #166534; border-radius: 16px; font-size: 11px; font-weight: 500; }

  .msg { display: flex; gap: 8px; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: 1px; }
  .avatar.ai { background: var(--brown); }
  .avatar.user { background: #dbeafe; color: #1d4ed8; font-weight: 500; }
  .bubble { max-width: calc(100% - 70px); padding: 6px 12px; font-size: 13.5px; line-height: 1.6; color: var(--text); word-break: break-word; }
  .msg.ai .bubble { background: var(--bg-sidebar); border: 0.5px solid var(--border); border-radius: 4px 12px 12px 12px; }
  .msg.user .bubble { background: var(--brown); color: #fdf6ec; border-radius: 12px 4px 12px 12px; }

  /* SEARCH INDICATOR */
  .search-indicator { display: inline-block; font-size: 10px; padding: 1px 8px; background: #dbeafe; color: #1d4ed8; border-radius: 10px; margin-bottom: 4px; }

  .code-block { margin: 6px 0; border-radius: 6px; overflow: hidden; border: 0.5px solid var(--border-md); }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: rgba(0,0,0,0.06); font-size: 10px; color: var(--text-muted); }
  .code-header .lang { font-weight: 500; }
  .code-actions { display: flex; gap: 3px; }
  .code-actions button { padding: 1px 6px; font-size: 10px; border: 0.5px solid var(--border-md); border-radius: 3px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 2px; }
  .code-actions button:hover { background: var(--bg-main); color: var(--text); }
  .code-block pre { margin: 0; padding: 10px; background: rgba(0,0,0,0.03); overflow-x: auto; font-size: 12px; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.4; }
  .msg.ai .bubble code:not(.code-block code) { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: monospace; }
  .msg.user .bubble code { background: rgba(255,255,255,0.15); padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: monospace; }

  .gen-image-wrap { margin: 6px 0; }
  .gen-image-wrap img { max-width: 100%; max-height: 260px; border-radius: 8px; display: block; border: 0.5px solid var(--border-md); }
  .gen-image-wrap .img-caption { font-size: 10px; color: var(--text-hint); margin-top: 3px; }
  .img-generating { display: flex; align-items: center; gap: 6px; padding: 10px; background: var(--bg-sidebar); border-radius: 8px; border: 0.5px solid var(--border); font-size: 12px; color: var(--text-muted); }

  .run-preview { margin: 6px 0; border: 0.5px solid var(--border-md); border-radius: 6px; overflow: hidden; }
  .run-preview iframe { width: 100%; height: 260px; border: none; background: white; }

  .typing { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; background: var(--text-hint); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2}40%{opacity:1} }

  #input-area { border-top: 0.5px solid var(--border); padding: 10px 14px; }
  #input-row { display: flex; gap: 6px; align-items: flex-end; }
  #text-input { flex: 1; min-height: 32px; max-height: 100px; padding: 6px 10px; border: 0.5px solid var(--border-md); border-radius: var(--radius); background: var(--bg-main); color: var(--text); font-size: 13px; resize: none; font-family: inherit; line-height: 1.4; outline: none; transition: border-color 0.15s; }
  #text-input:focus { border-color: var(--brown); }
  #text-input::placeholder { color: var(--text-hint); font-size: 12px; }
  #send-btn { width: 32px; height: 32px; flex-shrink: 0; background: var(--brown); border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.15s, transform 0.1s; }
  #send-btn:hover { background: var(--brown-dark); }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 20px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" fill="#C4853A"/>

      </div>
    </div>

</div>

<script>
// ============================================================
// 1. –Т–Ш–Я–†–Р–Т–Ы–Х–Э–Э–ѓ –Ж–Д–†–Ю–У–Ы–Ж–§–Ж–Т
// ============================================================

function fixBrokenUnicode(text) {
  if (!text) return text;
  
  const fixes = {
    '√Р': '–Д', '√С': '–З',
    '√Р¬≤': '–≤', '√Р¬≥': '–≥', '√Р¬і': '–і', '√Р¬µ': '–µ', '√Р¬ґ': '–ґ',
    '√Р¬Ј': '–Ј', '√Р¬Є': '–Є', '√Р¬є': '–є', '√Р¬Ї': '–Ї', '√Р¬ї': '–ї',
    '√Р¬Љ': '–Љ', '√Р¬љ': '–љ', '√Р¬Њ': '–Њ', '√Р¬њ': '–њ', '√С': '—А',
    '√С¬Б': '—Б', '√С¬В': '—В', '√С¬Г': '—Г', '√С¬Д': '—Д', '√С¬Е': '—Е',
    '√С¬Ж': '—Ж', '√С¬З': '—З', '√С¬И': '—И', '√С¬Й': '—Й', '√С¬М': '—М',
    '√С¬О': '—О', '√С¬П': '—П', '√Р¬∞': '–∞', '√Р¬±': '–±', '√С¬Ц': '—Ц',
    '√С¬Ч': '—Ч', '√С¬Ф': '—Ф', '√Р¬Р': '–Р', '√Р¬С': '–С', '√Р¬Т': '–Т',
    '√Р¬У': '–У', '√Р¬Ф': '–Ф', '√Р¬Х': '–Х', '√Р¬Ц': '–Ц', '√Р¬Ч': '–Ч',
    '√Р¬Ш': '–Ш', '√Р¬Щ': '–Щ', '√Р¬Ъ': '–Ъ', '√Р¬Ы': '–Ы', '√Р¬Ь': '–Ь',
    '√Р¬Э': '–Э', '√Р¬Ю': '–Ю', '√Р¬Я': '–Я', '√Р¬°': '–°', '√Р¬Ґ': '–Ґ',
    '√Р¬£': '–£', '√Р¬§': '–§', '√Р¬•': '–•', '√Р¬¶': '–¶', '√Р¬І': '–І',
    '√Р¬®': '–®', '√Р¬©': '–©', '√Р¬™': '–™', '√Р¬Ђ': '–Ђ', '√Р¬ђ': '–ђ',
    '√Р¬≠': '–≠', '√Р¬Ѓ': '–Ѓ', '√Р¬ѓ': '–ѓ', '√С¬А': '—А', '√С¬Б': '—Б',
    '√С¬В': '—В', '√С¬Г': '—Г', '√С¬Д': '—Д', '√С¬Е': '—Е', '√С¬Ж': '—Ж',
    '√С¬З': '—З', '√С¬И': '—И', '√С¬Й': '—Й', '√С¬К': '—К', '√С¬Л': '—Л',
    '√С¬М': '—М', '√С¬Н': '—Н', '√С¬О': '—О', '√С¬П': '—П'
  };
  
  try { text = text.normalize('NFC'); } catch(e) {}
  
  for (const [bad, good] of Object.entries(fixes)) {
    text = text.replace(new RegExp(bad, 'g'), good);
  }
  
  return text;
}

function sanitizeText(text) {
  if (!text) return text;
  text = text.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
  text = fixBrokenUnicode(text);
  return text;
}

// ============================================================
// 2. –Р–Т–Ґ–Ю–Т–Ш–Ч–Э–Р–І–Х–Э–Э–ѓ –Ь–Ю–Т–Ш
// ============================================================

const WARNING_MESSAGES_UK = [
  "вЪ†пЄП –ѓ –≤—Ц–і–њ–Њ–≤—Ц–і–∞—О —Г–Ї—А–∞—Ч–љ—Б—М–Ї–Њ—О, –∞–ї–µ —П –Ј—А–Њ–Ј—Г–Љ—Ц–≤ —В–≤–Њ—Ф –Ј–∞–њ–Є—В–∞–љ–љ—П. –Ю—Б—М –Љ–Њ—П –≤—Ц–і–њ–Њ–≤—Ц–і—М:",
  "вЪ†пЄП –ѓ –љ–µ —Б–њ—Ц–ї–Ї—Г—О—Б—П —А–Њ—Б—Ц–є—Б—М–Ї–Њ—О, –∞–ї–µ —П –Ј—А–Њ–Ј—Г–Љ—Ц–≤, —Й–Њ —В–Є —Е–Њ—З–µ—И –Ј–∞–њ–Є—В–∞—В–Є. –Ю—Б—М –≤—Ц–і–њ–Њ–≤—Ц–і—М —Г–Ї—А–∞—Ч–љ—Б—М–Ї–Њ—О:",
  "вЪ†пЄП –Т–Є–±–∞—З, –∞–ї–µ —П –љ–µ –≤—Ц–і–њ–Њ–≤—Ц–і–∞—О —А–Њ—Б—Ц–є—Б—М–Ї–Њ—О. –Я—А–Њ—В–µ —П –Ј—А–Њ–Ј—Г–Љ—Ц–≤ —В–≤—Ц–є –Ј–∞–њ–Є—В. –Ю—Б—М –Љ–Њ—П –≤—Ц–і–њ–Њ–≤—Ц–і—М:",
  "вЪ†пЄП –ѓ –љ–µ —А–Њ–Ј–Љ–Њ–≤–ї—П—О —А–Њ—Б—Ц–є—Б—М–Ї–Њ—О, –∞–ї–µ —П –Ј—А–Њ–Ј—Г–Љ—Ц–≤ —Б—Г—В—М –њ–Є—В–∞–љ–љ—П. –Т—Ц–і–њ–Њ–≤—Ц–і–∞—О —Г–Ї—А–∞—Ч–љ—Б—М–Ї–Њ—О:",
  "вЪ†пЄП –†–Њ—Б—Ц–є—Б—М–Ї–∞ вАФ –љ–µ –Љ–Њ—П –Љ–Њ–≤–∞, –∞–ї–µ —П –Ј—А–Њ–Ј—Г–Љ—Ц–≤ –Ј–∞–њ–Є—В. –Ю—Б—М –Љ–Њ—П –≤—Ц–і–њ–Њ–≤—Ц–і—М —Г–Ї—А–∞—Ч–љ—Б—М–Ї–Њ—О:"
];

function getRandomWarning() {
  return WARNING_MESSAGES_UK[Math.floor(Math.random() * WARNING_MESSAGES_UK.length)];
}

function detectLanguage(text) {
  text = sanitizeText(text);
  if (!text) return 'en';
  
  const ukrLetters = /[—Ц—Ч—Ф“С]/i;
  const rusOnlyLetters = /[—С—Л—К—Н]/i;
  const cyrillic = /[–∞-—П—С—Ц—Ч—Ф“С]/i;
  
  const ukrBaseWords = ['–њ—А–Є–≤—Ц—В', '–і–Њ–±—А–Є–є', '–і–µ–љ—М', '–≤–µ—З—Ц—А', '—А–∞–љ–Њ–Ї', '–і—П–Ї—Г—О', 
    '—Б–њ–∞—Б–Є–±—Ц', '–±—Г–і—М', '–ї–∞—Б–Ї–∞', '–≤–Є–±–∞—З', '–њ—А–Њ–±–∞—З', '–і–Њ–њ–Њ–Љ–Њ–ґ–Є', '—Б–Ї–∞–ґ–Є', 
    '—А–Њ–Ј–Ї–∞–ґ–Є', '–њ–Њ—П—Б–љ–Є', '–љ–∞–њ–Є—И–Є', '–Ј—А–Њ–±–Є', '—В–∞–Ї', '–љ—Ц', '–Љ–Њ–ґ–љ–∞', '—В—А–µ–±–∞',
    '–њ–Њ—В—А—Ц–±–љ–Њ', '–≥–∞—А–љ–Њ', '–і–Њ–±—А–µ', '–њ–Њ–≥–∞–љ–Њ', '—Ж—Ц–Ї–∞–≤–Њ', '—Б—Г–њ–µ—А', '–Ї—А—Г—В–Њ',
    '–љ–Њ—Г', '–є–Њ—Г', '–Њ–Ї–µ–є', '–Њ–Ї', '–≤–∞—Г', '–≥–Њ—Г', '—Е–∞–є', '—Е–µ–є', '–є—Ф—Б'];
  
  const rusBaseWords = ['–њ—А–Є–≤–µ—В', '–і–Њ–±—А—Л–є', '–і–µ–љ—М', '–≤–µ—З–µ—А', '—Г—В—А–Њ', '—Б–њ–∞—Б–Є–±–Њ', 
    '–њ–Њ–ґ–∞–ї—Г–є—Б—В–∞', '–Є–Ј–≤–Є–љ–Є', '–њ—А–Њ—Б—В–Є', '–њ–Њ–Љ–Њ–≥–Є', '—Б–Ї–∞–ґ–Є', '—А–∞—Б—Б–Ї–∞–ґ–Є', 
    '–Њ–±—К—П—Б–љ–Є', '–љ–∞–њ–Є—И–Є', '—Б–і–µ–ї–∞–є', '–і–∞', '–љ–µ—В', '–Љ–Њ–ґ–љ–Њ', '–љ—Г–ґ–љ–Њ',
    '–љ–∞–і–Њ', '—Е–Њ—А–Њ—И–Њ', '–њ–ї–Њ—Е–Њ', '–Є–љ—В–µ—А–µ—Б–љ–Њ', '—Б—Г–њ–µ—А', '–Ї—А—Г—В–Њ'];
  
  let ukrScore = 0, rusScore = 0;
  let hasUkrLetters = false, hasRusOnlyLetters = false;
  
  for (const char of text) {
    if (ukrLetters.test(char)) { hasUkrLetters = true; ukrScore += 2; }
    if (rusOnlyLetters.test(char)) { hasRusOnlyLetters = true; rusScore += 2; }
  }
  
  const words = text.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  for (const word of words) {
    if (ukrBaseWords.some(w => word.includes(w))) ukrScore += 1.5;
    if (rusBaseWords.some(w => word.includes(w))) rusScore += 1.5;
  }
  
  if (hasUkrLetters) return 'uk';
  if (hasRusOnlyLetters && !hasUkrLetters) return 'ru';
  if (ukrScore > rusScore && ukrScore > 0) return 'uk';
  if (rusScore > ukrScore && rusScore > 0) return 'ru';
  
  if (cyrillic.test(text)) {
    if (/[–∞-—П]–Є$/i.test(text) || /[–∞-—П]—О$/i.test(text) || /[–∞-—П]–Њ$/i.test(text)) return 'uk';
    if (/[–∞-—П]—Л$/i.test(text) || /[–∞-—П]–µ$/i.test(text)) return 'ru';
  }
  
  if (/[a-zA-Z]/.test(text)) return 'en';
  return 'en';
}

function isRussian(text) {
  text = sanitizeText(text);
  if (!text) return false;
  if (/[—Ц—Ч—Ф“С]/i.test(text)) return false;
  if (/[—С—Л—К—Н]/i.test(text) && !/[—Ц—Ч—Ф“С]/i.test(text)) return true;
  return detectLanguage(text) === 'ru';
}

const searchCache = new Map();

// --- DuckDuckGo ---
async function searchDuckDuckGo(query) {
  const cacheKey = 'ddg_' + query.toLowerCase().trim();
  if (searchCache.has(cacheKey)) {
    const cached = searchCache.get(cacheKey);
    if (Date.now() - cached.timestamp < 3600000) return cached.data;
  }
  try {
    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('DDG error');
    const data = await response.json();
    const results = [];
    if (data.AbstractText) results.push({ title: data.Heading || '–†–µ–Ј—Г–ї—М—В–∞—В', snippet: data.AbstractText, url: data.AbstractURL || '#' });
    if (data.RelatedTopics) {
      data.RelatedTopics.forEach(topic => {
        if (topic.Text && topic.Text.length > 10) {
          const parts = topic.Text.split(' - ');
          results.push({ title: parts[0] || '–Я–Њ–≤\'—П–Ј–∞–љ–µ', snippet: parts.slice(1).join(' - ') || topic.Text, url: topic.FirstURL || '#' });
        }
      });
    }
    searchCache.set(cacheKey, { data: results, timestamp: Date.now() });
    return results;
  } catch (e) { return []; }
}

// --- Qwant (—А–µ–Ј–µ—А–≤–љ–Є–є) ---
async function searchQwant(query) {
  const cacheKey = 'qw_' + query.toLowerCase().trim();
  if (searchCache.has(cacheKey)) {
    const cached = searchCache.get(cacheKey);
    if (Date.now() - cached.timestamp < 3600000) return cached.data;
  }
  try {
    const url = `https://api.qwant.com/v3/search/web?q=${encodeURIComponent(query)}&count=10&locale=uk_UA&safesearch=1`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('Qwant error');
    const data = await response.json();
    const results = [];
    if (data.status === 'success' && data.data?.result?.items) {
      data.data.result.items.forEach(item => {
        results.push({
          title: item.title.replace(/<[^>]*>/g, ''),
          snippet: item.desc.replace(/<[^>]*>/g, ''),
          url: item.url
        });
      });
    }
    searchCache.set(cacheKey, { data: results, timestamp: Date.now() });
    return results;
  } catch (e) {
    console.warn('Qwant search failed:', e);
    return [];
  }
}

// --- –Ю—Б–љ–Њ–≤–љ–Є–є –њ–Њ—И—Г–Ї (DDG + Qwant) ---
async function searchWeb(query) {
  // –°–њ–Њ—З–∞—В–Ї—Г –њ—А–Њ–±—Г—Ф–Љ–Њ DuckDuckGo
  let results = await searchDuckDuckGo(query);
  
  // –ѓ–Ї—Й–Њ DDG –љ—Ц—З–Њ–≥–Њ –љ–µ –Ј–љ–∞–є—И–Њ–≤ –∞–±–Њ –Љ–µ–љ—И–µ 3 —А–µ–Ј—Г–ї—М—В–∞—В—Ц–≤ вАФ –њ—А–Њ–±—Г—Ф–Љ–Њ Qwant
  if (!results || results.length < 3) {
    console.log('рЯФД DDG –Љ–∞–ї–Њ —А–µ–Ј—Г–ї—М—В–∞—В—Ц–≤, –њ—А–Њ–±—Г—Ф–Љ–Њ Qwant...');
    const qwantResults = await searchQwant(query);
    
    // –Ю–±'—Ф–і–љ—Г—Ф–Љ–Њ —А–µ–Ј—Г–ї—М—В–∞—В–Є (—Г–љ–Є–Ї–∞—Ф–Љ–Њ –і—Г–±–ї—Ц–Ї–∞—В—Ц–≤ –Ј–∞ URL)
    const seen = new Set();
    const combined = [...results, ...qwantResults];
    const unique = combined.filter(r => {
      const key = r.url;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    results = unique;
  }
  
  // –Ы–Њ–≥—Г—Ф–Љ–Њ –і–ґ–µ—А–µ–ї–Њ
  const source = results.length > 0 && results.some(r => r.url && !r.url.startsWith('#'));
  if (source) {
    console.log(`рЯФН –Ч–љ–∞–є–і–µ–љ–Њ ${results.length} —А–µ–Ј—Г–ї—М—В–∞—В—Ц–≤ (DDG + Qwant)`);
  }
  
  return results;
}

function renderCodeBlock(code, lang) {
  const id = 'cb_' + Math.random().toString(36).slice(2);
  const isRunnable = ['html', 'javascript', 'js', 'css'].includes((lang||'').toLowerCase());
  const safeCode = esc(code);
  const langLabel = lang || 'code';

  let actionsHtml = `<button onclick="copyCode('${id}')"><i class="ti ti-copy" style="font-size:10px;"></i></button>`;
  if (isRunnable) actionsHtml += `<button onclick="runCode('${id}', \`${code.replace(/`/g,'\\`')}\`)"><i class="ti ti-player-play" style="font-size:10px;"></i></button>`;

  return `<div class="code-block" id="${id}">
    <div class="code-header">
      <span class="lang">${langLabel}</span>
      <div class="code-actions">${actionsHtml}</div>
    </div>
    <pre><code>${safeCode}</code></pre>
  </div>`;
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const code = el.querySelector('pre code').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('вЬЕ –Ъ–Њ–і —Б–Ї–Њ–њ—Ц–є–Њ–≤–∞–љ–Њ!')).catch(() => showToast('вЭМ –Э–µ –≤–і–∞–ї–Њ—Б—П —Б–Ї–Њ–њ—Ц—О–≤–∞—В–Є'));
}

function runCode(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  let existing = el.nextElementSibling;
  if (existing && existing.classList.contains('run-preview')) existing.remove();
  const preview = document.createElement('div');
  preview.className = 'run-preview';
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts';
  preview.appendChild(iframe);
  el.insertAdjacentElement('afterend', preview);
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open(); doc.write(code); doc.close();
  scrollBot();
}

  showToast('вЬЕ –Ъ–ї—О—З –Ј–±–µ—А–µ–ґ–µ–љ–Њ!');
}

const messagesEl = document.getElementById('messages');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const chatListEl = document.getElementById('chat-list');
const topbarTitle = document.getElementById('topbar-title');

let chats = [], activeChatId = null, loading = false;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  text = sanitizeText(text);
  if (!text) return '';
  
  const codeBlocks = [];
  let h = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang.trim(), code: code.trim() });
    return `%%CODE_BLOCK_${idx}%%`;
  });

  h = esc(h);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  h = h.replace(/\n/g, '<br>');

  codeBlocks.forEach((b, i) => {
    h = h.replace(`%%CODE_BLOCK_${i}%%`, renderCodeBlock(b.code, b.lang));
  });

  return h;
}

function createChat(title) {
  const id = genId();
  chats.push({ id, title: title || '–Э–Њ–≤–Є–є —З–∞—В', messages: [], created: new Date().toISOString() });
  activeChatId = id; renderList(); saveLocalChats(); return id;
}

function deleteChat(id) {
  if (!confirm('–Т–Є–і–∞–ї–Є—В–Є —Ж–µ–є —З–∞—В?')) return;
  chats = chats.filter(c => c.id !== id);
  if (activeChatId === id) {
    activeChatId = chats.length > 0 ? chats[chats.length-1].id : null;
    if (activeChatId) { const c = chats.find(c=>c.id===activeChatId); topbarTitle.textContent=c.title; renderMsgs(c.messages); }
    else { createChat('–Э–Њ–≤–Є–є —З–∞—В'); showWelcome(); }
  }
  renderList(); saveLocalChats();
}

function renderList() {
  chatListEl.innerHTML = '';
  [...chats].reverse().forEach(c => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
    el.innerHTML = `<i class="ti ti-message" aria-hidden="true"></i>${esc(c.title)}`;
    el.onclick = () => { activeChatId=c.id; topbarTitle.textContent=c.title; renderMsgs(c.messages); renderList(); };
    const del = document.createElement('span');
    del.className = 'delete-chat'; del.innerHTML = 'вЬХ';
    del.onclick = e => { e.stopPropagation(); deleteChat(c.id); };
    el.appendChild(del); chatListEl.appendChild(el);
  });
}

function showWelcome() {
  messagesEl.innerHTML = `<div class="welcome">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" fill="#C4853A"/>
      <circle cx="16" cy="18" r="2.5" fill="#3B1F0A" opacity="0.85"/>
      <circle cx="27" cy="16" r="2" fill="#3B1F0A" opacity="0.85"/>
      <circle cx="31" cy="25" r="2.3" fill="#3B1F0A" opacity="0.85"/>
      <circle cx="20" cy="30" r="2" fill="#3B1F0A" opacity="0.85"/>
    </svg>
    <h2>рЯН™ Coockie AI</h2>
    <p>Groq + Llama 3.3 70B вАФ —А–Њ–Ј—Г–Љ–љ–Є–є, —И–≤–Є–і–Ї–Є–є, –±–µ–Ј–Ї–Њ—И—В–Њ–≤–љ–Є–є!</p>
    <span class="free-badge">вЬУ –Э–µ–Њ–±–Љ–µ–ґ–µ–љ–Њ ¬Ј –С–µ–Ј —А–µ—Ф—Б—В—А–∞—Ж—Ц—Ч</span>
  </div>`;
}

function renderMsgs(msgs) {
  if (!msgs || !msgs.length) { showWelcome(); return; }
  messagesEl.innerHTML = '';
  msgs.forEach(m => addBubble(m.role, m.text, m.imagePrompt, false));
  scrollBot();
}

function addBubble(role, text, imagePrompt, scroll = true) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const bt = document.createElement('span');
  bt.innerHTML = fmt(text);
  bubble.appendChild(bt);

  if (imagePrompt && role === 'ai') addImageBubble(bubble, imagePrompt);

  wrap.innerHTML = `<div class="avatar ${role}">${role === 'ai' ? 'рЯН™' : 'рЯС§'}</div>`;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  if (scroll) scrollBot();
}

function showTyping() {
  const w = document.createElement('div'); w.className = 'msg ai'; w.id = 'typ';
  w.innerHTML = `<div class="avatar ai">рЯН™</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(w); scrollBot();
}
function rmTyping() { const e = document.getElementById('typ'); if (e) e.remove(); }
function scrollBot() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function saveLocalChats() { localStorage.setItem('coockie_chats', JSON.stringify(chats)); }

function loadLocalChats() {
  try { chats = JSON.parse(localStorage.getItem('coockie_chats') || '[]'); if (!Array.isArray(chats)) chats = []; } catch(e) { chats = []; }
  if (chats.length === 0) { createChat('–Ы–∞—Б–Ї–∞–≤–Њ –њ—А–Њ—Б–Є–Љ–Њ'); showWelcome(); return; }
  renderList();
  activeChatId = chats[chats.length-1].id;
  const chat = chats.find(c=>c.id===activeChatId);
  if (chat) { topbarTitle.textContent = chat.title; renderMsgs(chat.messages); }
}

// 8. –Т–Ж–Ф–Я–†–Р–Т–Ъ–Р

async function send() {
  const text = textInput.value.trim();
  if (!text || loading) return;
  if (!apiKey) { showToast('вЪ†пЄП –Т–≤–µ–і–Є Groq API –Ї–ї—О—З!'); return; }

  const detectedLang = detectLanguage(text);
  const isRus = isRussian(text);
  
  if (!activeChatId) createChat(text.slice(0, 30));
  const chat = chats.find(c => c.id === activeChatId);
  if (!chat) return;

  const imgRequest = isImageRequest(text);
  const imgPrompt = imgRequest ? extractImagePrompt(text) : null;

  chat.messages.push({ role: 'user', text });
  if (chat.messages.length === 1) { chat.title = text.slice(0, 32); topbarTitle.textContent = chat.title; renderList(); }

  addBubble('user', text, null);
  textInput.value = ''; textInput.style.height = '';
  loading = true; sendBtn.disabled = true; showTyping();

  try {
    let searchContext = '';
    let searchResults = [];
    
    if (needsInternetSearch(text)) {
      searchResults = await searchWeb(text);
      
      if (searchResults.length > 0) {
        searchContext = '\n\nрЯФН –Р–Ї—В—Г–∞–ї—М–љ–∞ —Ц–љ—Д–Њ—А–Љ–∞—Ж—Ц—П –Ј DuckDuckGo + Qwant:\n' +
          searchResults.slice(0, 6).map((r, i) => 
            `${i+1}. **${r.title}**\n   ${r.snippet.slice(0, 350)}${r.snippet.length > 350 ? '...' : ''}`
          ).join('\n');
        
        const sources = searchResults.slice(0, 4).map(r => r.url).filter(u => u && u !== '#');
        if (sources.length > 0) {
          searchContext += '\n\nрЯУО –Ф–ґ–µ—А–µ–ї–∞: ' + sources.join(', ');
        }
      } else {
        searchContext = '\n\nвЪ†пЄП –Э–µ –≤–і–∞–ї–Њ—Б—П –Ј–љ–∞–є—В–Є –∞–Ї—В—Г–∞–ї—М–љ—Г —Ц–љ—Д–Њ—А–Љ–∞—Ж—Ц—О. –°–њ—А–Њ–±—Г–є –њ–µ—А–µ—Д–Њ—А–Љ—Г–ї—О–≤–∞—В–Є –Ј–∞–њ–Є—В.';
      }
    }

    const basePrompt = `–Ґ–Є Coockie вАФ —А–Њ–Ј—Г–Љ–љ–Є–є, –і—А—Г–ґ–љ—Ц–є –®–Ж-–∞—Б–Є—Б—В–µ–љ—В. 
–Ґ–Є –≤–Љ—Ц—Ф—И:
- –Т—Ц–і–њ–Њ–≤—Ц–і–∞—В–Є –љ–∞ –њ–Є—В–∞–љ–љ—П —В–∞ –≤–µ—Б—В–Є –±–µ—Б—Ц–і—Г
- –Я–Є—Б–∞—В–Є —В–∞ –њ–Њ—П—Б–љ—О–≤–∞—В–Є –Ї–Њ–і (–≤–Є–Ї–Њ—А–Є—Б—В–Њ–≤—Г–є \`\`\`–Љ–Њ–≤–∞ ... \`\`\` –і–ї—П –±–ї–Њ–Ї—Ц–≤ –Ї–Њ–і—Г)
- –У–µ–љ–µ—А—Г–≤–∞—В–Є –Ј–Њ–±—А–∞–ґ–µ–љ–љ—П (—П–Ї—Й–Њ –њ—А–Њ—Б—П—В—М –љ–∞–Љ–∞–ї—О–≤–∞—В–Є вАФ –њ—А–Њ—Б—В–Њ –Њ–њ–Є—И–Є —Й–Њ –љ–∞–Љ–∞–ї—О—Ф—И, –Ј–Њ–±—А–∞–ґ–µ–љ–љ—П –Ј'—П–≤–Є—В—М—Б—П –∞–≤—В–Њ–Љ–∞—В–Є—З–љ–Њ)
${searchContext ? searchContext : ''}

–Т–Р–Ц–Ы–Ш–Т–Ю: –ѓ–Ї—Й–Њ —П –љ–∞–і–∞–≤ —В–Њ–±—Ц –њ–Њ—И—Г–Ї–Њ–≤—Г —Ц–љ—Д–Њ—А–Љ–∞—Ж—Ц—О вАФ –≤–Є–Ї–Њ—А–Є—Б—В–Њ–≤—Г–є —Ч—Ч –і–ї—П –≤—Ц–і–њ–Њ–≤—Ц–і—Ц! –ѓ–Ї—Й–Њ –і–∞–љ–Є—Е –љ–µ–і–Њ—Б—В–∞—В–љ—М–Њ вАФ —З–µ—Б–љ–Њ —Б–Ї–∞–ґ–Є –њ—А–Њ —Ж–µ —Ц –і–∞–є –≤—Ц–і–њ–Њ–≤—Ц–і—М –љ–∞ –Њ—Б–љ–Њ–≤—Ц —Б–≤–Њ—Ч—Е –Ј–љ–∞–љ—М.`;

    let systemPrompt;
    let warningPrefix = '';
    
    if (isRus) {
      warningPrefix = getRandomWarning() + '\n\n';
      const langInstruction = getSystemPromptForLanguage('uk');
      systemPrompt = `${basePrompt}\n\n${langInstruction}\n\n–Т–Р–Ц–Ы–Ш–Т–Ю: –Ъ–Њ—А–Є—Б—В—Г–≤–∞—З –љ–∞–њ–Є—Б–∞–≤ —А–Њ—Б—Ц–є—Б—М–Ї–Њ—О, –∞–ї–µ —В–Є –Т–Ж–Ф–Я–Ю–Т–Ж–Ф–Р–Д–® –£–Ъ–†–Р–З–Э–°–ђ–Ъ–Ю–Ѓ. –°–њ–Њ—З–∞—В–Ї—Г –љ–∞–њ–Є—И–Є –њ–Њ–њ–µ—А–µ–і–ґ–µ–љ–љ—П, –∞ –њ–Њ—В—Ц–Љ –і–∞–є –Ј–Љ—Ц—Б—В–Њ–≤–љ—Г –≤—Ц–і–њ–Њ–≤—Ц–і—М.`;
    } else {
      const langInstruction = getSystemPromptForLanguage(detectedLang);
      systemPrompt = `${basePrompt}\n\n${langInstruction}`;
    }

    const messages = [
      { role: 'system', content: systemPrompt },
      ...chat.messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }))
    ];

    if (isRus) {
      messages.splice(1, 0, { 
        role: 'system', 
        content: `–Ґ–Є –Љ–∞—Ф—И –≤—Ц–і–њ–Њ–≤—Ц—Б—В–Є —Г–Ї—А–∞—Ч–љ—Б—М–Ї–Њ—О. –°–њ–Њ—З–∞—В–Ї—Г –љ–∞–њ–Є—И–Є: "${warningPrefix}" –∞ –њ–Њ—В—Ц–Љ –і–∞–є –≤—Ц–і–њ–Њ–≤—Ц–і—М –љ–∞ –Ј–∞–њ–Є—В–∞–љ–љ—П –Ї–Њ—А–Є—Б—В—Г–≤–∞—З–∞.` 
      });
    }

    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, max_tokens: 2000, temperature: 0.85 })
    });

    const data = await resp.json();
    rmTyping();
    if (data.error) throw new Error(data.error.message);

    let reply = data.choices?.[0]?.message?.content || 'вА¶';
    reply = sanitizeText(reply);

    if (isRus && !reply.includes('–ѓ –≤—Ц–і–њ–Њ–≤—Ц–і–∞—О') && !reply.includes('–ѓ –љ–µ —Б–њ—Ц–ї–Ї—Г—О—Б—П') && !reply.includes('–Т–Є–±–∞—З') && !reply.includes('–†–Њ—Б—Ц–є—Б—М–Ї–∞')) {
      reply = getRandomWarning() + '\n\n' + reply;
    }

    if (searchResults.length > 0 && !reply.includes('–Ф–ґ–µ—А–µ–ї–∞')) {
      const sources = searchResults.slice(0, 4).map(r => r.url).filter(u => u && u !== '#');
      if (sources.length > 0) {
        reply += '\n\nрЯУО –Ф–ґ–µ—А–µ–ї–∞: ' + sources.join(', ');
      }
    }

    chat.messages.push({ role: 'ai', text: reply, imagePrompt: imgPrompt });
    addBubble('ai', reply, imgPrompt);
    saveLocalChats();

  } catch (e) {
    rmTyping();
    addBubble('ai', 'вЪ†пЄП –Я–Њ–Љ–Є–ї–Ї–∞: ' + esc(e.message));
  }

  loading = false; sendBtn.disabled = false;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('export-btn').onclick = async function() {
  if (!chats.length) { showToast('вЭМ –Э–µ–Љ–∞—Ф —З–∞—В—Ц–≤'); return; }
  try {
    const zip = new JSZip();
    zip.file('chats.json', JSON.stringify({ version: '1.0', exportedAt: new Date().toISOString(), chats }, null, 2));
    chats.forEach(c => {
      const name = c.title.replace(/[^a-z0-9]/gi,'_').slice(0,30);
      zip.file(`chats/${name}_${c.id}.json`, JSON.stringify(c, null, 2));
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    saveAs(blob, `coockie_chats_${new Date().toISOString().slice(0,10)}.zip`);
    showToast('вЬЕ –І–∞—В–Є –µ–Ї—Б–њ–Њ—А—В–Њ–≤–∞–љ–Њ!');
  } catch(e) { showToast('вЭМ ' + e.message); }
};

document.getElementById('import-file').onchange = async function(e) {
  const file = e.target.files[0]; if (!file) return;
  try {
    const zip = await JSZip.loadAsync(file);
    const chatFile = zip.file('chats.json');
    if (!chatFile) { showToast('вЭМ –Э–µ–≤—Ц—А–љ–Є–є —Д–Њ—А–Љ–∞—В'); return; }
    const data = JSON.parse(await chatFile.async('text'));
    if (!data.chats || !Array.isArray(data.chats)) { showToast('вЭМ –Э–µ–≤—Ц—А–љ—Ц –і–∞–љ—Ц'); return; }
    if (!confirm(`–Ч–љ–∞–є–і–µ–љ–Њ ${data.chats.length} —З–∞—В—Ц–≤. –Ж–Љ–њ–Њ—А—В—Г–≤–∞—В–Є? (–Я–Њ—В–Њ—З–љ—Ц –Ј–∞–Љ—Ц–љ—П—В—М)`)) return;
    chats = data.chats; saveLocalChats(); loadLocalChats();
    showToast(`вЬЕ –Ж–Љ–њ–Њ—А—В–Њ–≤–∞–љ–Њ ${chats.length} —З–∞—В—Ц–≤!`);
    this.value = '';
  } catch(e) { showToast('вЭМ ' + e.message); this.value = ''; }
};
